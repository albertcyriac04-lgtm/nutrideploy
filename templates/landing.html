<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriDiet - Personalized Health & Nutrition</title>
    {% load static %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 min-h-screen">
    <div class="flex flex-col items-center justify-center min-h-screen p-8">
        <div class="max-w-2xl w-full text-center">
            <!-- Logo -->
            <div class="mb-8">
                <div
                    class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl shadow-lg mb-4">
                    <i class="fas fa-heart-pulse text-white text-3xl"></i>
                </div>
                <h1
                    class="text-5xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-2">
                    NutriDiet
                </h1>
                <p class="text-slate-600 text-lg">Your Personalized Health & Nutrition Companion</p>
            </div>

            <!-- Features -->
            <div class="bg-white rounded-2xl shadow-xl p-8 mb-8 border border-slate-100">
                <div class="grid md:grid-cols-3 gap-6 mb-8">
                    <div class="text-center">
                        <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-utensils text-blue-600 text-2xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800 mb-2">Food Tracking</h3>
                        <p class="text-sm text-slate-600">Track your meals and nutrition</p>
                    </div>
                    <div class="text-center">
                        <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-chart-line text-indigo-600 text-2xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800 mb-2">Progress Monitoring</h3>
                        <p class="text-sm text-slate-600">Monitor your health journey</p>
                    </div>
                    <div class="text-center">
                        <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-robot text-purple-600 text-2xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800 mb-2">AI Coach</h3>
                        <p class="text-sm text-slate-600">Get personalized advice</p>
                    </div>
                </div>

                <!-- Login Button -->
                <a href="{% url 'login' %}"
                    class="block w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:scale-105">
                    <i class="fas fa-arrow-right mr-2"></i>
                    Get Started
                </a>
            </div>

            <!-- Footer -->
            <p class="text-slate-500 text-sm">
                Start your health journey today
            </p>
        </div>
    </div>
</body>

</html>
