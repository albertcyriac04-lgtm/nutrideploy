<aside class="fixed left-0 top-0 h-full w-64 sidebar-glass z-10 hidden md:block flex flex-col">
    <div class="p-6 flex-1 flex flex-col">
        <div class="flex items-center gap-2 mb-8">
            <div class="bg-slate-900 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-slate-200">
                <i class="fas fa-gem text-lg"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tight text-slate-800 font-heading">NutriDiet</span>
        </div>
        
        <nav class="space-y-1.5 flex-1">
            <a href="{% url 'index' %}"
                class="sidebar-link-hover flex items-center gap-3 px-4 py-3 rounded-2xl transition-all {% if request.resolver_match.url_name == 'index' %}sidebar-link-active{% else %}text-slate-500 font-medium{% endif %}">
                <i class="fas fa-chart-line w-5 text-center"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'logs' %}"
                class="sidebar-link-hover flex items-center gap-3 px-4 py-3 rounded-2xl transition-all {% if request.resolver_match.url_name == 'logs' %}sidebar-link-active{% else %}text-slate-500 font-medium{% endif %}">
                <i class="fas fa-utensils w-5 text-center"></i>
                <span>Food Logs</span>
            </a>
            <a href="{% url 'coach' %}"
                class="sidebar-link-hover flex items-center gap-3 px-4 py-3 rounded-2xl transition-all {% if request.resolver_match.url_name == 'coach' %}sidebar-link-active{% else %}text-slate-500 font-medium{% endif %}">
                <i class="fas fa-robot w-5 text-center"></i>
                <span>AI Coach</span>
            </a>
            <a href="{% url 'settings' %}"
                class="sidebar-link-hover flex items-center gap-3 px-4 py-3 rounded-2xl transition-all {% if request.resolver_match.url_name == 'settings' %}sidebar-link-active{% else %}text-slate-500 font-medium{% endif %}">
                <i class="fas fa-cog w-5 text-center"></i>
                <span>Settings</span>
            </a>
            <a href="{% url 'billing' %}"
                class="sidebar-link-hover flex items-center gap-3 px-4 py-3 rounded-2xl transition-all {% if request.resolver_match.url_name == 'billing' %}sidebar-link-active{% else %}text-slate-500 font-medium{% endif %}">
                <i class="fas fa-file-invoice-dollar w-5 text-center"></i>
                <span>Billing</span>
            </a>

            <!-- ADMIN PANEL - PERFECTLY ALIGNED -->
            {% if user.is_staff %}
            <div class="pt-4 mt-4 border-t border-slate-200/50">
                <p class="px-4 mb-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Administrative</p>
                <a href="{% url 'admin:index' %}"
                    class="sidebar-link-hover flex items-center gap-3 px-4 py-3 rounded-2xl transition-all text-indigo-600 font-semibold hover:bg-indigo-50/50">
                    <i class="fas fa-user-shield w-5 text-center"></i>
                    <span>Admin Panel</span>
                </a>
            </div>
            {% endif %}
        </nav>

        <div class="pt-4 border-t border-slate-200/50">
            <a href="{% url 'logout' %}" onclick="return confirm('Are you sure you want to logout?')"
                class="sidebar-link-hover flex items-center gap-3 px-4 py-3 rounded-2xl transition-all text-red-500 font-medium hover:bg-red-50/50 w-full">
                <i class="fas fa-sign-out-alt w-5 text-center"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>
</aside>
